# Test Infrastructure Docker Compose
# 用于运行集成测试的基础设施服务
#
# 使用方法：
#   1. 启动所有服务：docker-compose -f docker-compose.test.yml up -d
#   2. 运行测试：go test -v ./...
#   3. 停止服务：docker-compose -f docker-compose.test.yml down
#
# 或者使用 testcontainers-go 自动管理容器

version: '3.8'

services:
  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: golang-test-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  # NATS 服务
  nats:
    image: nats:2-alpine
    container_name: golang-test-nats
    ports:
      - "4222:4222"
      - "8222:8222"  # 监控端口
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: "-m 8222 -js"  # 启用 JetStream

  # PostgreSQL 服务（用于 Ent 集成测试）
  postgres:
    image: postgres:16-alpine
    container_name: golang-test-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # MySQL 服务（可选）
  mysql:
    image: mysql:8.0
    container_name: golang-test-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: test
      MYSQL_PASSWORD: test
      MYSQL_DATABASE: testdb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql

  # Kafka 服务（可选，如果需要）
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: golang-test-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: golang-test-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mysql_data:
