name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        default: 'v0.0.0-test'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25.3'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # =============================================================================
  # Prepare Release
  # =============================================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
      release_notes: ${{ steps.notes.outputs.NOTES }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          if [[ ${{ github.ref_type }} == 'tag' ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          IS_PRERELEASE="false"
          if [[ "$VERSION" =~ -(alpha|beta|rc|pre|dev) ]]; then
            IS_PRERELEASE="true"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Is Prerelease: $IS_PRERELEASE"

      - name: Generate changelog
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Generating changelog from $PREVIOUS_TAG to $VERSION"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD --no-merges || echo "- See commit history for changes")
          else
            echo "Generating changelog from beginning to $VERSION"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20 || echo "- See commit history for changes")
          fi
          
          # Create release notes
          NOTES="## What's Changed

$CHANGELOG

## Binaries

| Platform | Architecture | Binary |
|----------|--------------|--------|
| Linux | amd64 | \`${VERSION}-linux-amd64\` |
| Linux | arm64 | \`${VERSION}-linux-arm64\` |
| macOS | amd64 | \`${VERSION}-darwin-amd64\` |
| macOS | arm64 | \`${VERSION}-darwin-arm64\` |
| Windows | amd64 | \`${VERSION}-windows-amd64.exe\` |

## Docker Images

\`\`\`bash
docker pull ghcr.io/${{ github.repository }}:${VERSION}
\`\`\`

## Checksums

See \`checksums.txt\` for SHA256 checksums of all binaries."
          
          # Write to output (handle multiline)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # =============================================================================
  # Build Binaries
  # =============================================================================
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - target: server
            binary_name: server
          - target: grpc-server
            binary_name: grpc-server
          - target: graphql-server
            binary_name: graphql-server
          - target: temporal-worker
            binary_name: temporal-worker
          - target: cli
            binary_name: app-cli
          - target: mqtt-client
            binary_name: mqtt-client
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build for Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.version }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/${{ matrix.target }}-${{ needs.prepare.outputs.version }}-linux-amd64 \
            ./cmd/${{ matrix.target }}

      - name: Build for Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.version }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/${{ matrix.target }}-${{ needs.prepare.outputs.version }}-linux-arm64 \
            ./cmd/${{ matrix.target }}

      - name: Build for Darwin amd64
        run: |
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.version }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/${{ matrix.target }}-${{ needs.prepare.outputs.version }}-darwin-amd64 \
            ./cmd/${{ matrix.target }}

      - name: Build for Darwin arm64
        run: |
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.version }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/${{ matrix.target }}-${{ needs.prepare.outputs.version }}-darwin-arm64 \
            ./cmd/${{ matrix.target }}

      - name: Build for Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.version }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/${{ matrix.target }}-${{ needs.prepare.outputs.version }}-windows-amd64.exe \
            ./cmd/${{ matrix.target }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-binaries
          path: dist/*
          retention-days: 7

  # =============================================================================
  # Generate Checksums
  # =============================================================================
  checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-binaries'

      - name: Organize binaries
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt
          retention-days: 7

  # =============================================================================
  # Create GitHub Release
  # =============================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries, checksums]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release files
        run: |
          mkdir -p release
          find artifacts -type f ! -name "checksums.txt" -exec cp {} release/ \;
          cp artifacts/checksums/checksums.txt release/ 2>/dev/null || true
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: ${{ needs.prepare.outputs.release_notes }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          files: release/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # Build and Push Docker Images
  # =============================================================================
  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: [prepare, create-release]
    strategy:
      matrix:
        target:
          - server
          - grpc-server
          - temporal-worker
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ !needs.prepare.outputs.is_prerelease }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/package/Dockerfile.${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}

  # =============================================================================
  # Publish to Package Managers (Optional)
  # =============================================================================
  publish-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [prepare, create-release]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(needs.prepare.outputs.version, '-')
    steps:
      - name: Trigger Homebrew update
        run: |
          echo "Triggering Homebrew tap update..."
          # This would typically trigger a workflow in your homebrew-tap repo
          # curl -X POST \
          #   -H "Authorization: token ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
          #   -H "Accept: application/vnd.github.v3+json" \
          #   https://api.github.com/repos/${{ github.repository_owner }}/homebrew-tap/dispatches \
          #   -d "{\"event_type\": \"update-formula\", \"client_payload\": {\"version\": \"${{ needs.prepare.outputs.version }}\"}}"
          echo "Homebrew tap update would be triggered here"
        continue-on-error: true

  # =============================================================================
  # Release Summary
  # =============================================================================
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries, checksums, create-release, docker-release]
    if: always()
    steps:
      - name: Generate release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Prerelease:** ${{ needs.prepare.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prepare | ${{ needs.prepare.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Binaries | ${{ needs.build-binaries.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checksums | ${{ needs.checksums.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Create Release | ${{ needs.create-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Release | ${{ needs.docker-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Images: \`ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
