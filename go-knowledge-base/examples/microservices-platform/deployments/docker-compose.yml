version: '3.8'

services:
  # Infrastructure Services
  postgres:
    image: postgres:15-alpine
    container_name: microservices-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6-jammy
    container_name: microservices-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: microservices-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: microservices-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: microservices-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-network

  nats:
    image: nats:2-alpine
    container_name: microservices-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-m 8222"
    networks:
      - microservices-network

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: microservices-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - microservices-network

  # Application Services
  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    container_name: microservices-user-service
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      GIN_MODE: release
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/users?sslmode=disable
      REDIS_URL: redis:6379
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRY: 24h
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped

  order-service:
    build:
      context: ../services/order-service
      dockerfile: Dockerfile
    container_name: microservices-order-service
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      GIN_MODE: release
      MONGODB_URI: mongodb://admin:admin@mongodb:27017/orders?authSource=admin
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - mongodb
      - kafka
    networks:
      - microservices-network
    restart: unless-stopped

  payment-service:
    build:
      context: ../services/payment-service
      dockerfile: Dockerfile
    container_name: microservices-payment-service
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      GIN_MODE: release
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
    networks:
      - microservices-network
    restart: unless-stopped

  inventory-service:
    build:
      context: ../services/inventory-service
      dockerfile: Dockerfile
    container_name: microservices-inventory-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      GIN_MODE: release
      REDIS_URL: redis:6379
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    container_name: microservices-notification-service
    ports:
      - "8085:8085"
    environment:
      PORT: 8085
      GIN_MODE: release
      NATS_URL: nats:4222
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      - nats
    networks:
      - microservices-network
    restart: unless-stopped

  # Observability Stack
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: microservices-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - microservices-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: microservices-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - microservices-network

  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: microservices-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - microservices-network

  # API Gateway
  kong:
    image: kong:3.5
    container_name: microservices-kong
    ports:
      - "8080:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PLUGINS: bundled
    volumes:
      - ./kong:/kong/declarative
    networks:
      - microservices-network
    depends_on:
      - user-service
      - order-service
      - payment-service
      - inventory-service
      - notification-service

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: microservices-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - microservices-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  microservices-network:
    driver: bridge
