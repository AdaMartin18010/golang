version: '3.8'

services:
  raft-node-1:
    build:
      context: ..
      dockerfile: cmd/server/Dockerfile
    container_name: leader-election-node-1
    environment:
      - NODE_ID=node-1
      - NODE_ADDRESS=raft-node-1:12000
      - PEERS=raft-node-1:12000,raft-node-2:12000,raft-node-3:12000
      - HTTP_PORT=8080
    ports:
      - "12001:12000"
      - "8081:8080"
    volumes:
      - node1-data:/data
    networks:
      - raft-network
    restart: unless-stopped

  raft-node-2:
    build:
      context: ..
      dockerfile: cmd/server/Dockerfile
    container_name: leader-election-node-2
    environment:
      - NODE_ID=node-2
      - NODE_ADDRESS=raft-node-2:12000
      - PEERS=raft-node-1:12000,raft-node-2:12000,raft-node-3:12000
      - HTTP_PORT=8080
    ports:
      - "12002:12000"
      - "8082:8080"
    volumes:
      - node2-data:/data
    networks:
      - raft-network
    restart: unless-stopped

  raft-node-3:
    build:
      context: ..
      dockerfile: cmd/server/Dockerfile
    container_name: leader-election-node-3
    environment:
      - NODE_ID=node-3
      - NODE_ADDRESS=raft-node-3:12000
      - PEERS=raft-node-1:12000,raft-node-2:12000,raft-node-3:12000
      - HTTP_PORT=8080
    ports:
      - "12003:12000"
      - "8083:8080"
    volumes:
      - node3-data:/data
    networks:
      - raft-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: leader-election-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - raft-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: leader-election-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - raft-network

volumes:
  node1-data:
  node2-data:
  node3-data:
  prometheus_data:
  grafana_data:

networks:
  raft-network:
    driver: bridge
